    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <link rel="icon"
          href="./favicon.ico?v=2" />
    <link rel="stylesheet"

    <style>
        :root {
            --primary-accent: #00d2ff; /* Vibrant Cyan */
            --secondary-accent: #3a4750;
            --bg-deep: #0e0e0e;
            --card-bg: #1a1a1a;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --status-gold: #ffc107;
        }
        body { font-family: 'Poppins', sans-serif; color: var(--text-main); background-color: var(--bg-deep); }
        .resumee-container { background-color: var(--bg-deep); border: 1px solid #333; overflow: hidden; width: 100%; }
        .resumme-header { background: linear-gradient(135deg, #16213e 0%, #0f172a 100%); color: white; padding: 40px 20px; border-bottom: 4px solid var(--primary-accent); display: flex; justify-content: center; align-items: center; min-height: 200px; }
        .headline { text-align: center; max-width: 100%; z-index: 2; }
        .headline h1 { color: var(--primary-accent); letter-spacing: 1px; font-size: 1.8rem; margin-bottom: 10px; font-weight: 700; }
        .headline h4 { color: var(--text-muted); font-weight: 300; font-size: 1rem; line-height: 1.3; margin-top: 0; }
        .first-column { background-color: rgba(255,255,255,0.02); border-right: 1px solid #222; }
        .header-5 { color: var(--primary-accent); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .header-6 { color: var(--text-muted); font-weight: 600; }
        hr { border-top: 2px solid var(--primary-accent); width: 40px; margin-left: 0; opacity: 0.5; }
        .role { color: var(--primary-accent); font-weight: 600; }
        .company-wrapper { background: var(--card-bg) !important; border: 1px solid #333; transition: 0.3s; }
        .company-wrapper:hover { border-color: var(--primary-accent); }
        .years-of-experience { background: var(--primary-accent); color: #000; font-weight: bold; padding: 2px 8px; border-radius: 4px; }
        .footer { background: transparent; padding: 30px; border-top: 1px solid #222; }
        .footer img { filter: brightness(0) invert(1); opacity: 0.5; transition: 0.3s; margin: 0 25px; max-height: 40px; }

        @media (min-width: 992px) {
            .resumme-header { justify-content: flex-end; align-items: flex-end; min-height: 250px; padding: 40px; }
            .headline { text-align: right; max-width: 600px; }
            .headline h1 { font-size: 2.5rem; letter-spacing: 2px; }
            .headline h4 { font-size: 1.1rem; }
        }
        
        /* Print optimization */
        @media print {
            body { background: white !important; color: black !important; }
            .resumee-container { border: none !important; box-shadow: none !important; background: white !important; }
            .resumme-header { background: #f0f0f0 !important; color: black !important; border-bottom: 2px solid #333 !important; }
            .headline h1, .header-5, .role { color: #0056b3 !important; }
            .company-wrapper { background: white !important; border: 1px solid #ddd !important; break-inside: avoid; }
            .projects-wrapper { max-height: none !important; opacity: 1 !important; }
            .toggle, .bi-chevron-compact-down { display: none !important; }
            .first-column { border-right: 1px solid #eee !important; background: transparent !important; }
        }
    </style>
</head>

<body>
    <div id="app" class="text-center w-100">

                                    </div>
                                </div>
                                <div class="company"><i class="bi bi-building"></i> {{item["Company"]}} </div>
                                <div class="period"><i class="bi bi-calendar"></i> {{item["Period"]}} </div>
                                <div class="skills"><i class="bi bi-sliders"></i> {{item["Technology Stack"]}}</div>
                                <div class="w-100 text-center toggle">
                                    <i class="bi bi-chevron-compact-down"></i>
                                </div>
                                <div class="projects-wrapper"
                                     v-bind:class="{'expanded':item.expanded}">
                                    <div class="projects"> Projects </div>
                                    <div class="project"
                                         v-for="project in item['Projects']">
                                        <div class="project-name"> Name: {{project["Name"]}} </div>
                                        <div class="project-context"><strong>Context:</strong> {{project['Context']}}
                                        </div>
                                        <div class="skills"> {{project["Technology Stack"]}}</div>

                                        <div class="tasks"> Tasks/Experience: </div>
                                        <ul>
                                            <li class="task"
                                                v-for="task in project['Tasks/Experience']">
                                                {{task}}
                                            </li>
                                        </ul>

                                        <div class="achievements"> Achievements: </div>
                                        <ul>
                                            <li class="achievement"
                                                v-for="achievement in project['Achievements']">
                                                {{achievement}}
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                            </article>
                        </div>

                        <hr>
                        <section aria-label="Education">

                        <div class="header-6">Certifications:</div>

                        <div class="company-year">Certified SAFe® 6 Product Owner / Product Manager</div>
                        <div class="company-year">Certified Scrum Master</div>
                        <br>
                        <div class="header-6">TECHNICAL UNIVERSITY OF CLUJ-NAPOCA, ROMANIA</div>
                        <div class="company-year">Engineering Degree in Telecommunications</div>
                        </section>
                    </section>
                </div>
                <footer class="footer">

            </main>

            methods: {
                toggle(event, item) {
                    item.expanded = !item.expanded;

                toggleAll() {
                    if (this.workExperienceData.find(i => i.expanded)) {
                        this.workExperienceData.map(i => i.expanded = false);

</body>


</html>
